<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВГУ Расписание PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --accent: #2980b9;
            --glass: rgba(255, 255, 255, 0.8);
            --text: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background: #e0f2fe;
            color: var(--text);
            min-height: 100vh;
            display: flex; justify-content: center;
        }

        /* Анимированный фон */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #e0f2fe 0%, #bae6fd 100%);
            overflow: hidden;
        }
        .blob {
            position: absolute; width: 600px; height: 600px;
            background: rgba(52, 152, 219, 0.2);
            filter: blur(80px); border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        .app-container {
            width: 100%; max-width: 500px;
            padding: 20px 20px 100px 20px;
        }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Стеклянные карточки */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        select {
            width: 100%; padding: 15px; border-radius: 16px;
            border: 2px solid #cbd5e1; background: white;
            font-size: 16px; margin-bottom: 20px; outline: none;
        }

        /* Стили дня */
        .day-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 24px;
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
        }
        .day-title {
            font-weight: 800; color: var(--accent);
            border-bottom: 1px solid rgba(52,152,219,0.2);
            padding-bottom: 10px; margin-bottom: 15px;
        }
        .lesson-row {
            display: flex; gap: 15px; padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .lesson-row:last-child { border-bottom: none; }
        .time-badge {
            background: #eff6ff; color: var(--primary);
            padding: 6px; border-radius: 10px; font-weight: 700;
            font-size: 12px; min-width: 80px; text-align: center; height: fit-content;
        }

        /* Нижняя панель */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            height: 70px; border-radius: 25px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .nav-icon { font-size: 24px; }
        .nav-text { font-size: 11px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="bg-animate">
        <div class="blob" style="top: -5%; left: -5%;"></div>
        <div class="blob" style="bottom: -5%; right: -5%; background: rgba(186, 230, 253, 0.4);"></div>
    </div>

    <div class="app-container">
        <h1 style="text-align:center; color: var(--accent);">ВГУ Mobile</h1>

        <div id="screen-setup" class="screen active">
            <div class="glass-card">
                <label style="font-weight:600; display:block; margin-bottom:10px;">📍 Факультет</label>
                <select id="fac-select"><option value="" disabled selected>Загрузка...</option></select>
                
                <div id="group-area" style="display:none;">
                    <label style="font-weight:600; display:block; margin-bottom:10px;">👥 Группа</label>
                    <select id="group-select"></select>
                </div>
            </div>
        </div>

        <div id="screen-schedule" class="screen">
            <div id="schedule-render"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchScreen('setup', this)">
            <span class="nav-icon">⚙️</span><span class="nav-text">Настройки</span>
        </div>
        <div class="nav-item" onclick="switchScreen('schedule', this)">
            <span class="nav-icon">📅</span><span class="nav-text">Расписание</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
