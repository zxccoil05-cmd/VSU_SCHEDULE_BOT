<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ВГУ Расписание</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --glass: rgba(226, 232, 240, 0.7); 
            --glass-thick: rgba(241, 245, 249, 0.98);
            --border: rgba(148, 163, 184, 0.4);
            --text: #0f172a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background: #f1f5f9;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* ЖИВОЙ ФОН */
        .bg-wrapper { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.8; }
        .blob-1 { width: 300px; height: 300px; background: #3b82f6; top: -50px; left: -50px; }
        .blob-2 { width: 300px; height: 300px; background: #93c5fd; bottom: -50px; right: -50px; }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .app-viewport { width: 100%; height: 100%; overflow: hidden; }
        .screens-container { display: flex; width: 200%; height: 100%; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .screen { 
            width: 50%; height: 100%; 
            display: flex; flex-direction: column;
            padding: 20px;
        }

        /* ЭКРАН НАСТРОЕК */
        .setup-content { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        h1.logo { text-align: center; color: #1e40af; font-weight: 800; margin: 40px 0; }
        
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 26px;
            padding: 22px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        select {
            width: 100%; padding: 15px; border-radius: 16px; border: 1px solid var(--border); 
            background: white; font-size: 16px; margin-top: 10px; color: #1e3a8a; font-weight: 600; outline: none;
        }

        /* НОВАЯ КНОПКА СВЯЗИ В НАСТРОЙКАХ */
        .admin-link-btn {
            width: 100%; margin-top: 25px; padding: 16px; border-radius: 18px;
            background: #ef4444; color: white; border: none; font-weight: 800;
            font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); transition: 0.3s;
        }
        .admin-link-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* ЭКРАН РАСПИСАНИЯ */
        .schedule-header {
            background: var(--glass-thick); backdrop-filter: blur(10px);
            margin: -20px -20px 0 -20px; padding: 20px 20px 15px 20px;
            border-bottom: 1px solid var(--border); z-index: 10;
        }
        .days-tabs { display: flex; gap: 6px; width: 100%; max-width: 500px; margin: 0 auto; }
        .day-tab {
            flex: 1; text-align: center; padding: 12px 0; border-radius: 12px;
            background: white; color: #1e40af; font-size: 11px; font-weight: 800;
            transition: 0.2s; border: 1px solid var(--border);
        }
        .day-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        .schedule-content { flex: 1; overflow-y: auto; padding-top: 20px; padding-bottom: 100px; }
        .swiper-track { display: flex; width: 600%; transition: transform 0.4s ease-out; }
        .day-column { width: 16.666%; padding: 0 5px; }
        
        .lesson-row { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .time-badge { background: #dbeafe; color: #1e40af; padding: 6px; border-radius: 10px; font-weight: 700; font-size: 11px; min-width: 75px; text-align: center; }

        /* НАВИГАЦИЯ */
    /* ... (остальные стили оставляем как в предыдущем ответе) ... */

    /* НАВИГАЦИЯ С АНИМАЦИЕЙ */
            .bottom-nav {
                position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
                width: 90%; max-width: 380px; background: white; height: 75px; 
                border-radius: 28px; display: flex; justify-content: space-around; 
                align-items: center; box-shadow: 0 12px 35px rgba(0,0,0,0.12); z-index: 4000;
                border: 1px solid rgba(0,0,0,0.03);
            }

            .nav-item { 
                display: flex; flex-direction: column; align-items: center; 
                color: #94a3b8; cursor: pointer; position: relative;
                transition: color 0.3s ease;
                padding: 10px;
            }

            /* Анимация самой иконки (эмодзи) */
            .nav-item span:first-child {
                font-size: 24px;
                transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                display: inline-block;
            }

            /* Состояние когда вкладка активна */
            .nav-item.active { 
                color: var(--primary); 
            }

            .nav-item.active span:first-child {
                transform: translateY(-8px); /* Иконка подпрыгивает выше */
            }

            .nav-item span:last-child {
                font-size: 10px;
                font-weight: 800;
                margin-top: 4px;
                letter-spacing: 0.5px;
            }
</style>

    </style>
</head>
<body>

    <div class="bg-wrapper"><div class="blob-1 bg-blob"></div><div class="blob-2 bg-blob"></div></div>

    <div class="app-viewport">
        <div class="screens-container" id="screens-container">
            <section class="screen">
                <div class="setup-content">
                    <h1 class="logo">ВГУ Mobile</h1>
                    <div class="glass-card">
                        <label style="font-weight:700;">📍 Факультет</label>
                        <select id="fac-select"><option disabled selected>Загрузка...</option></select>
                        
                        <div id="group-area" style="display:none; margin-top: 25px;">
                            <label style="font-weight:700;">👥 Группа</label>
                            <select id="group-select"></select>
                            
                            <button class="admin-link-btn" onclick="window.open('https://t.me/wch8h', '_blank')">
                                <span>⚠️ Сообщить об ошибке</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="screen">
                <div class="schedule-header">
                    <div class="days-tabs" id="days-tabs">
                        <div class="day-tab" onclick="goToDay(0)">ПН</div>
                        <div class="day-tab" onclick="goToDay(1)">ВТ</div>
                        <div class="day-tab" onclick="goToDay(2)">СР</div>
                        <div class="day-tab" onclick="goToDay(3)">ЧТ</div>
                        <div class="day-tab" onclick="goToDay(4)">ПТ</div>
                        <div class="day-tab" onclick="goToDay(5)">СБ</div>
                    </div>
                </div>
                <div class="schedule-content" id="schedule-scroll-area">
                    <div id="schedule-swiper" style="overflow:hidden">
                        <div class="swiper-track" id="schedule-track"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchScreen(0)"><span>⚙️</span><span style="font-size:10px; font-weight:700;">ОПЦИИ</span></div>
        <div class="nav-item" onclick="switchScreen(1)"><span>📅</span><span style="font-size:10px; font-weight:700;">ПАРЫ</span></div>
    </div>

    <script>
        const API_BASE = "https://vsu-schedule-bot-code.onrender.com/api";
        let currentDayIndex = 0;
        let touchStartX = 0;

        function switchScreen(idx) {
            const container = document.getElementById('screens-container');
            // Плавный сдвиг экранов
            container.style.transform = `translateX(-${idx * 50}%)`;
            
            // Обновляем классы навигации
            const items = document.querySelectorAll('.nav-item');
            items.forEach((n, i) => {
                if(i === idx) {
                    n.classList.add('active');
                } else {
                    n.classList.remove('active');
                }
            });
        }

        function goToDay(idx) {
            if (idx < 0 || idx > 5) return;
            currentDayIndex = idx;
            document.getElementById('schedule-track').style.transform = `translateX(-${idx * 16.666}%)`;
            document.getElementById('days-tabs').querySelectorAll('.day-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        }

        async function loadSchedule(group) {
            const track = document.getElementById('schedule-track');
            track.innerHTML = '<div class="day-column"><div class="glass-card">🔄 Загрузка...</div></div>';
            try {
                const r = await fetch(`${API_BASE}/schedule/${encodeURIComponent(group)}`);
                const data = await r.json();
                const days = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
                track.innerHTML = days.map(day => {
                    const lessons = data.schedule[day] || [];
                    return `<div class="day-column"><div class="glass-card">
                        <div style="font-weight:800; color:#1e40af; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:12px;">${day.toUpperCase()}</div>
                        ${lessons.length ? lessons.map(l => `
                            <div class="lesson-row">
                                <div class="time-badge">${l.time.replace(/[()]/g,'')}</div>
                                <div><b style="font-size:14px;">${l.name}</b><br><small style="color:#64748b">${l.room} | ${l.teacher}</small></div>
                            </div>
                        `).join('') : '<div style="text-align:center; padding:20px; color:#94a3b8;">Пар нет 🎉</div>'}
                    </div></div>`;
                }).join('');
                let d = new Date().getDay();
                goToDay(d === 0 ? 0 : d - 1);
                switchScreen(1);
            } catch (e) { track.innerHTML = '<div class="day-column"><div class="glass-card">Ошибка API</div></div>'; }
        }

        async function init() {
            const fSel = document.getElementById('fac-select');
            try {
                const r = await fetch(`${API_BASE}/faculties`);
                const data = await r.json();
                fSel.innerHTML = '<option disabled selected>Выберите факультет...</option>' + 
                    data.faculties.map(f => `<option value="${f}">${f}</option>`).join('');
            } catch (e) { fSel.innerHTML = '<option>Ошибка сети</option>'; }

            const savedF = localStorage.getItem('vsu_fac'), savedG = localStorage.getItem('vsu_group');
            if (savedF && savedG) {
                fSel.value = savedF; await loadGroups(savedF);
                document.getElementById('group-select').value = savedG; loadSchedule(savedG);
            }
        }

        async function loadGroups(fac) {
            const gSel = document.getElementById('group-select');
            document.getElementById('group-area').style.display = 'block';
            gSel.innerHTML = '<option>Загрузка...</option>';
            const r = await fetch(`${API_BASE}/faculties/${fac}/groups`);
            const data = await r.json();
            gSel.innerHTML = data.groups.map(g => `<option value="${g}">${g}</option>`).join('');
        }

        document.getElementById('fac-select').onchange = (e) => {
            localStorage.setItem('vsu_fac', e.target.value); loadGroups(e.target.value);
        };
        document.getElementById('group-select').onchange = (e) => {
            localStorage.setItem('vsu_group', e.target.value); loadSchedule(e.target.value);
        };

        const swiper = document.getElementById('schedule-swiper');
        swiper.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX, {passive: true});
        swiper.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 70) diff > 0 ? goToDay(currentDayIndex + 1) : goToDay(currentDayIndex - 1);
        });

        init();
    </script>
</body>
</html>
